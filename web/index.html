<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Revive Eco Tech: Bridging the gap between waste producers and recyclers through a seamless digital ecosystem for efficient scrap collection and environmental impact tracking.">
  <meta name="theme-color" content="#013D5A">

  <!-- iOS meta tags & icons -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Revive Eco">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png">

  <title>Revive Eco</title>
  <link rel="manifest" href="manifest.json">
  
  <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport">
  <style id="splash-screen-style">
    html {
      height: 100%
    }

    body {
      margin: 0;
      min-height: 100%;
      background-color: #013D5A;
      background-size: 100% 100%;
    }

    .center {
      margin: 0;
      position: absolute;
      top: 50%;
      left: 50%;
      -ms-transform: translate(-50%, -50%);
      transform: translate(-50%, -50%);
    }

    .contain {
      display:block;
      width:100%; height:100%;
      object-fit: contain;
    }

    .stretch {
      display:block;
      width:100%; height:100%;
    }

    .cover {
      display:block;
      width:100%; height:100%;
      object-fit: cover;
    }

    .bottom {
      position: absolute;
      bottom: 0;
      left: 50%;
      -ms-transform: translate(-50%, 0);
      transform: translate(-50%, 0);
    }

    .bottomLeft {
      position: absolute;
      bottom: 0;
      left: 0;
    }

    .bottomRight {
      position: absolute;
      bottom: 0;
      right: 0;
    }

    /* PWA Install Promotion Banner Styles */
    #pwa-install-banner {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(150px);
      background-color: #013D5A; /* App Primary Color */
      color: #FCF3E3; /* App Cream Color */
      padding: 16px 20px;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
      z-index: 100000;
      display: flex;
      align-items: center;
      gap: 16px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.3s;
      width: calc(100% - 32px);
      max-width: 420px;
      opacity: 0;
      pointer-events: none;
      box-sizing: border-box;
    }
    #pwa-install-banner.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
      pointer-events: auto;
    }
    #pwa-install-banner .banner-logo {
      width: 44px;
      height: 44px;
      border-radius: 10px;
      object-fit: cover;
      background-color: #FCF3E3;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    }
    #pwa-install-banner .banner-text {
      flex: 1;
      display: flex;
      flex-direction: column;
    }
    #pwa-install-banner .banner-title {
      font-weight: 700;
      font-size: 15px;
      margin: 0 0 2px 0;
      letter-spacing: 0.3px;
    }
    #pwa-install-banner .banner-subtitle {
      font-size: 12px;
      opacity: 0.9;
      margin: 0;
      line-height: 1.3;
    }
    #pwa-install-banner .banner-actions {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    #pwa-install-banner .btn-install {
      background-color: #A6CB4E; /* App Accent Color */
      color: #013D5A;
      border: none;
      padding: 8px 14px;
      border-radius: 8px;
      font-weight: 700;
      font-size: 13px;
      cursor: pointer;
      transition: background-color 0.2s, transform 0.1s;
    }
    #pwa-install-banner .btn-install:active {
      transform: scale(0.95);
    }
    #pwa-install-banner .btn-close {
      background: none;
      border: none;
      color: #FCF3E3;
      cursor: pointer;
      font-size: 18px;
      padding: 4px;
      opacity: 0.7;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity 0.2s;
    }
    #pwa-install-banner .btn-close:hover {
      opacity: 1;
    }
  </style>
  <script id="splash-screen-script">
    function removeSplashFromWeb() {
      document.getElementById("splash")?.remove();
      document.getElementById("splash-branding")?.remove();
      document.body.style.background = "transparent";
    }
    
  </script>
  <script
  src="https://maps.googleapis.com/maps/api/js?key=AIzaSyDzz4Aysry1F51chHm16SmrfUXWek7XueQ&libraries=places">
</script>
</head>
<body>
  <picture id="splash">
      <source srcset="splash/img/light-1x.png 1x, splash/img/light-2x.png 2x, splash/img/light-3x.png 3x, splash/img/light-4x.png 4x" media="(prefers-color-scheme: light)">
      <source srcset="splash/img/dark-1x.png 1x, splash/img/dark-2x.png 2x, splash/img/dark-3x.png 3x, splash/img/dark-4x.png 4x" media="(prefers-color-scheme: dark)">
      <img class="center" aria-hidden="true" src="splash/img/light-1x.png" alt="">
  </picture>
  
  <!-- Interactive PWA Install Banner DOM -->
  <div id="pwa-install-banner">
    <img class="banner-logo" src="favicon.png" alt="Revive Eco Logo">
    <div class="banner-text">
      <p class="banner-title" id="pwa-title">Install Revive Eco</p>
      <p class="banner-subtitle" id="pwa-desc">Install our app on your device for quick access and a full-screen experience.</p>
    </div>
    <div class="banner-actions">
      <button class="btn-install" id="pwa-install-btn">Install</button>
      <button class="btn-close" id="pwa-close-btn" aria-label="Dismiss">✕</button>
    </div>
  </div>

  <script>
    (function() {
      let deferredPrompt = null;
      const banner = document.getElementById('pwa-install-banner');
      const installBtn = document.getElementById('pwa-install-btn');
      const closeBtn = document.getElementById('pwa-close-btn');
      const titleEl = document.getElementById('pwa-title');
      const descEl = document.getElementById('pwa-desc');

      // Helper to check if already in standalone mode
      const isStandalone = () => {
        return window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true;
      };

      // Helper to detect iOS Safari
      const isIosSafari = () => {
        const ua = window.navigator.userAgent;
        const isIos = /iPhone|iPad|iPod/.test(ua);
        const isSafari = /Safari/.test(ua) && !/CriOS|FxiOS|OPiOS|mercury/i.test(ua);
        return isIos && isSafari;
      };

      if (isStandalone()) {
        return; // Don't show banner if already running as PWA
      }

      // 1. Android & Desktop Chrome/Edge/Firefox
      window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        deferredPrompt = e;
        
        // Show the banner with a slight delay so they experience the app first
        setTimeout(() => {
          banner.classList.add('show');
        }, 5000);
      });

      // 2. iOS Safari Custom Banner Instructions
      if (isIosSafari()) {
        setTimeout(() => {
          titleEl.textContent = "Add to Home Screen";
          descEl.innerHTML = "Tap share icon <span style='font-size:16px;'>⎋</span> below and select <strong>'Add to Home Screen'</strong>.";
          installBtn.style.display = 'none'; // Hide programmatic button since iOS handles it via browser menu
          banner.classList.add('show');
        }, 5000);
      }

      // Event listener for Install Button
      installBtn.addEventListener('click', async () => {
        if (!deferredPrompt) return;
        banner.classList.remove('show');
        deferredPrompt.prompt();
        const { outcome } = await deferredPrompt.userChoice;
        console.log(`User response to PWA install: ${outcome}`);
        deferredPrompt = null;
      });

      // Event listener for Close Button
      closeBtn.addEventListener('click', () => {
        banner.classList.remove('show');
      });

      // Handle App Installed event
      window.addEventListener('appinstalled', (e) => {
        console.log('Revive Eco App successfully installed!');
        deferredPrompt = null;
        banner.classList.remove('show');
      });
    })();
  </script>

  <div id="recaptcha-container"></div>

<script src="flutter_bootstrap.js" async=""></script>
</body>
</html>
